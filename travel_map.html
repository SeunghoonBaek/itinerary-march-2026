<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #0f0f1a; color: #e0e0e0; }

  #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }

  /* Day selector panel */
  .panel {
    position: fixed; top: 16px; left: 16px; z-index: 1000;
    background: rgba(15,15,30,0.92); backdrop-filter: blur(16px);
    border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    width: 280px; max-height: calc(100vh - 32px); overflow-y: auto;
    transition: transform 0.3s ease;
  }
  .panel.collapsed { transform: translateX(-264px); }
  .panel.collapsed .toggle-btn { transform: rotate(180deg); }

  .panel-header {
    padding: 16px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-header h2 { font-size: 15px; font-weight: 700; color: #fff; }
  .toggle-btn {
    background: none; border: none; color: #888; cursor: pointer;
    font-size: 18px; transition: transform 0.3s; padding: 4px;
  }

  .day-list { padding: 8px; }
  .day-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 12px; margin-bottom: 3px;
    background: transparent; border: none; border-radius: 10px;
    color: #bbb; cursor: pointer; text-align: left;
    font-size: 12.5px; font-family: inherit; transition: all 0.2s;
  }
  .day-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .day-btn.active { background: rgba(99,132,255,0.15); color: #fff; }
  .day-btn .dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid currentColor;
  }
  .day-btn.active .dot { background: currentColor; }
  .day-btn .day-label { font-weight: 600; min-width: 32px; }
  .day-btn .day-desc { color: #999; font-size: 11px; }
  .day-btn.active .day-desc { color: #ccc; }

  .all-btn {
    display: block; width: calc(100% - 16px); margin: 4px 8px 8px;
    padding: 8px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    color: #aaa; cursor: pointer; font-size: 12px; font-family: inherit;
    text-align: center; transition: all 0.2s;
  }
  .all-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .all-btn.active { background: rgba(99,132,255,0.15); color: #fff; border-color: rgba(99,132,255,0.3); }

  /* My location button */
  .loc-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 1000;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(15,15,30,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    color: #6384ff; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .loc-btn:hover { background: rgba(99,132,255,0.2); transform: scale(1.1); }
  .loc-btn.tracking { color: #4ade80; border-color: rgba(74,222,128,0.3); }

  /* Legend */
  .legend {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 1000; background: rgba(15,15,30,0.9); backdrop-filter: blur(16px);
    border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
    padding: 8px 16px; display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #999;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; padding: 0 4px; white-space: nowrap; }
  .legend-line { width: 16px; height: 3px; border-radius: 2px; }

  /* Popup styling */
  .leaflet-popup-content-wrapper {
    background: rgba(20,20,40,0.95) !important; color: #e0e0e0 !important;
    border-radius: 12px !important; border: 1px solid rgba(255,255,255,0.1) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;

  .leaflet-popup-content { font-family: inherit !important; font-size: 13px !important; line-height: 1.6 !important; }
  .leaflet-popup-content strong { color: #fff; }
  .popup-time { color: #6384ff; font-weight: 600; font-size: 11px; }
  .popup-title { font-weight: 700; font-size: 14px; color: #fff; margin: 2px 0 4px; }
  .popup-desc { color: #bbb; font-size: 12px; }
  .popup-day { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; margin-bottom: 4px; }

  /* Scrollbar */
  .panel::-webkit-scrollbar { width: 4px; }

  .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .panel { width: 240px; top: 8px; left: 8px; }
    .legend { font-size: 10px; padding: 6px 10px; bottom: 16px; }

      { lat: 50.0875, lng: 14.4213, icon: '🍽️', name: '점심', time: '11:30–12:30', desc: 'Café Imperial or Lokál' },

// ── Layers ──
const layerGroups = {};
const routeLines = {};
let activeDay = null;
let locationMarker = null;
let locationCircle = null;
let watchId = null;
let isTracking = false;

// Custom icon factory
function createIcon(emoji, color) {
  return L.divIcon({
    html: `<div style="
      background: ${color};
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    ">${emoji}</div>`,
    className: '',
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -20]
  });
}

// Create small dot icon for "all view"
function createDotIcon(color) {
  return L.divIcon({
    html: `<div style="
      background: ${color}; width: 10px; height: 10px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.6);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    "></div>`,
    className: '',
    iconSize: [10, 10],
    iconAnchor: [5, 5],
    popupAnchor: [0, -8]
  });
}

// ── Build Layers ──
days.forEach(day => {
  const group = L.layerGroup();
  const coords = [];

  day.points.forEach((pt, i) => {
    const marker = L.marker([pt.lat, pt.lng], {
      icon: createIcon(pt.icon, day.color)
    });

    const popupHtml = `
      <div>
        <div class="popup-day" style="background:${day.color}; color:#000;">
          ${day.label} · ${day.date}
        </div>
        <div class="popup-time">${pt.time}</div>
        <div class="popup-title">${pt.icon} ${pt.name}</div>
        ${pt.desc ? `<div class="popup-desc">${pt.desc}</div>` : ''}
      </div>
    `;
    marker.bindPopup(popupHtml, { maxWidth: 260 });
    marker.addTo(group);

    coords.push([pt.lat, pt.lng]);
  });

  // Route line
  const line = L.polyline(coords, {
    color: day.color,
    weight: 3,
    opacity: 0.7,
    dashArray: '8, 6',
    smoothFactor: 1
  }).addTo(group);

  layerGroups[day.id] = group;
  routeLines[day.id] = line;
});

// ── Day Selector UI ──
const dayListEl = document.getElementById('dayList');
days.forEach(day => {
  const btn = document.createElement('button');
  btn.className = 'day-btn';
  btn.dataset.day = day.id;
  btn.innerHTML = `
    <div class="dot" style="color:${day.color}"></div>
    <span class="day-label">${day.label}</span>
    <span class="day-desc">${day.date} ${day.title}</span>
  `;
  btn.onclick = () => showDay(day.id);
  dayListEl.appendChild(btn);
});

// ── Show Day ──
function showDay(dayId) {
  activeDay = dayId;

  // Remove all layers
  Object.values(layerGroups).forEach(g => map.removeLayer(g));

  // Add selected day
  layerGroups[dayId].addTo(map);

  // Fit bounds
  const day = days.find(d => d.id === dayId);
  const bounds = routeLines[dayId].getBounds();
  map.fitBounds(bounds, { padding: [60, 60], maxZoom: day.zoom });

  // Update UI
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.day-btn[data-day="${dayId}"]`).classList.add('active');
  document.getElementById('allBtn').classList.remove('active');

  updateLegend(dayId);
}

// ── Show All ──
function showAll() {
  activeDay = null;

  // Remove all detailed layers
  Object.values(layerGroups).forEach(g => map.removeLayer(g));

  // Add all with smaller markers
  days.forEach(day => {
    layerGroups[day.id].addTo(map);
  });

  // Fit all
  const allCoords = [];
  days.forEach(day => day.points.forEach(pt => allCoords.push([pt.lat, pt.lng])));
  map.fitBounds(allCoords, { padding: [50, 50] });

  // Update UI
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('allBtn').classList.add('active');

  updateLegend(null);
}

// ── Legend ──
function updateLegend(dayId) {
  const legendEl = document.getElementById('legend');
  if (dayId) {
    const day = days.find(d => d.id === dayId);
    legendEl.innerHTML = `
      <div class="legend-item">
        <div class="legend-line" style="background:${day.color}"></div>
        <span>${day.label} ${day.date} — ${day.title}</span>
      </div>
    `;
  } else {
    legendEl.innerHTML = days.map(d => `
      <div class="legend-item">
        <div class="legend-line" style="background:${d.color}"></div>
        <span>${d.label}</span>
      </div>
    `).join('');
  }
}

// ── My Location ──
function toggleLocation() {
  const btn = document.getElementById('locBtn');

  if (isTracking) {
    // Stop tracking
    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    if (locationMarker) map.removeLayer(locationMarker);
    if (locationCircle) map.removeLayer(locationCircle);
    locationMarker = null;
    locationCircle = null;
    isTracking = false;
    btn.classList.remove('tracking');
    btn.innerHTML = '📍';
    return;
  }

  if (!navigator.geolocation) {
    alert('이 브라우저에서는 위치 추적을 지원하지 않습니다.');
    return;
  }

  isTracking = true;
  btn.classList.add('tracking');
  btn.innerHTML = '🟢';

  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const acc = pos.coords.accuracy;

      if (locationMarker) {
        locationMarker.setLatLng([lat, lng]);
        locationCircle.setLatLng([lat, lng]).setRadius(acc);
      } else {
        locationMarker = L.marker([lat, lng], {
          icon: L.divIcon({
            html: `<div style="
              width: 18px; height: 18px; border-radius: 50%;
              background: #4285f4; border: 3px solid #fff;
              box-shadow: 0 0 12px rgba(66,133,244,0.6);
            "></div>`,
            className: '',
            iconSize: [18, 18],
            iconAnchor: [9, 9]
          }),
          zIndexOffset: 2000
        }).addTo(map).bindPopup('📍 내 위치');

        locationCircle = L.circle([lat, lng], {
          radius: acc,
          color: '#4285f4',
          fillColor: '#4285f4',
          fillOpacity: 0.1,
          weight: 1
        }).addTo(map);

        map.setView([lat, lng], 15);
      }
    },
    (err) => {
      alert('위치를 가져올 수 없습니다: ' + err.message);
      isTracking = false;
      btn.classList.remove('tracking');
      btn.innerHTML = '📍';
    },
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 10000 }
  );
}

// ── Panel Toggle ──
function togglePanel() {
  document.getElementById('panel').classList.toggle('collapsed');
}

// ── Init: show all ──
showAll();
</script>
